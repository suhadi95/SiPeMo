```yaml
---
deployment:
  tasks:
    - export DEPLOYPATH=/home/suhadipc/public_html/web_sipemo2/
    - /bin/date > $DEPLOYPATH/deploy-test.txt

    # Hapus source code lama
    - /bin/rm -rf $DEPLOYPATH/app
    - /bin/rm -rf $DEPLOYPATH/config
    - /bin/rm -rf $DEPLOYPATH/database
    - /bin/rm -rf $DEPLOYPATH/resources
    - /bin/rm -rf $DEPLOYPATH/routes

    # Copy source code terbaru
    - /bin/cp -R app $DEPLOYPATH
    - /bin/cp -R bootstrap $DEPLOYPATH
    - /bin/cp -R config $DEPLOYPATH
    - /bin/cp -R database $DEPLOYPATH
    - /bin/cp -R resources $DEPLOYPATH
    - /bin/cp -R routes $DEPLOYPATH

    # Update folder public tanpa menghapus file upload
    - /bin/cp -R public/. $DEPLOYPATH/public/

    # Copy file utama Laravel
    - /bin/cp artisan $DEPLOYPATH
    - /bin/cp composer.json $DEPLOYPATH
    - /bin/cp composer.lock $DEPLOYPATH
```
